stages:
  - validate
  - security
  - integration
  - contracts
  - build
  - publish
  - promote

variables:
  WEB_IMAGE: "$CI_REGISTRY_IMAGE/diasoft-web"
  CONTRACTS_WORKDIR: ".ci-contracts"

validate:
  stage: validate
  image: node:22-alpine
  before_script:
    - apk add --no-cache curl tar
    - . ./scripts/fetch-contracts.sh
  script:
    - npm ci
    - npm run generate:types
    - npm run build

secrets_scan:
  stage: security
  image: zricethezav/gitleaks:v8.24.2
  script:
    - gitleaks detect --source . --no-git --redact

dependency_scan:
  stage: security
  image: aquasec/trivy:0.59.1
  entrypoint: [""]
  script:
    - trivy fs --scanners vuln --severity CRITICAL --exit-code 1 --no-progress .

sbom:
  stage: security
  image: anchore/syft:v1.18.1
  entrypoint: [""]
  script:
    - mkdir -p build
    - syft dir:. -o cyclonedx-json=build/web-sbom.cdx.json
  artifacts:
    paths:
      - build/web-sbom.cdx.json

integration_tests:
  stage: integration
  image: node:22-alpine
  before_script:
    - apk add --no-cache curl tar
    - . ./scripts/fetch-contracts.sh
  script:
    - npm ci
    - npm run generate:types
    - npm test

e2e_smoke:
  stage: integration
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  before_script:
    - apt-get update && apt-get install -y curl
    - . ./scripts/fetch-contracts.sh
  script:
    - npm ci
    - npm run generate:types
    - npm run test:e2e

contracts_artifacts:
  stage: contracts
  image: node:22-alpine
  before_script:
    - apk add --no-cache curl tar
    - . ./scripts/fetch-contracts.sh
  script:
    - npm ci
    - npm run generate:types
  artifacts:
    name: "web-contracts-$CI_COMMIT_SHA"
    paths:
      - src/lib/generated/

build_image:
  stage: build
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  script:
    - docker build -t "$WEB_IMAGE:$CI_COMMIT_SHA" .

publish_image:
  stage: publish
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$WEB_IMAGE:$CI_COMMIT_SHA" .
    - docker push "$WEB_IMAGE:$CI_COMMIT_SHA"
  only:
    - main

sign_image:
  stage: publish
  image: gcr.io/projectsigstore/cosign:v2.4.1
  entrypoint: [""]
  needs:
    - publish_image
  script:
    - cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$WEB_IMAGE:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $COSIGN_PRIVATE_KEY'

promote_team1_dev:
  stage: promote
  image: mikefarah/yq:4
  needs:
    - publish_image
  before_script:
    - apk add --no-cache git curl
  script:
    - TARGET_TEAM=team1 TARGET_ENV=dev PROMOTION_MODE=direct sh scripts/promote-platform-infra.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $PLATFORM_INFRA_REPO_URL && $PLATFORM_INFRA_PUSH_URL'

promote_team1_prod:
  stage: promote
  image: mikefarah/yq:4
  needs:
    - publish_image
  before_script:
    - apk add --no-cache git curl
  script:
    - TARGET_TEAM=team1 TARGET_ENV=prod PROMOTION_MODE=mr sh scripts/promote-platform-infra.sh
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $PLATFORM_INFRA_REPO_URL && $PLATFORM_INFRA_PUSH_URL'

promote_team2_dev:
  stage: promote
  image: mikefarah/yq:4
  needs:
    - publish_image
  before_script:
    - apk add --no-cache git curl
  script:
    - TARGET_TEAM=team2 TARGET_ENV=dev PROMOTION_MODE=direct sh scripts/promote-platform-infra.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $PLATFORM_INFRA_REPO_URL && $PLATFORM_INFRA_PUSH_URL'

promote_team2_prod:
  stage: promote
  image: mikefarah/yq:4
  needs:
    - publish_image
  before_script:
    - apk add --no-cache git curl
  script:
    - TARGET_TEAM=team2 TARGET_ENV=prod PROMOTION_MODE=mr sh scripts/promote-platform-infra.sh
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $PLATFORM_INFRA_REPO_URL && $PLATFORM_INFRA_PUSH_URL'
